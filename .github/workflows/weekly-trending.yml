name: 发布 GitHub 周热榜

'on':
  schedule:
    # GitHub Actions 的 cron 使用 UTC；02:30 UTC 即北京时间 10:30。
    - cron: "30 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  discussions: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      DISCUSSION_CATEGORY: Announcements
    steps:
      - name: 获取项目代码
        uses: actions/checkout@v7

      - name: 配置 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: 生成周热榜
        run: python scripts/generate_weekly.py --output report.md

      - name: 发布 Discussion
        run: python scripts/publish_discussion.py --report report.md
